<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pointing Tutorial</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="tutorial-shell" aria-label="TV remote pointing tutorial">
      <header class="tutorial-topbar">
        <div class="mission-progress" aria-label="튜토리얼 진행률">
          <span class="progress-dot is-active"></span>
          <span class="progress-dot"></span>
          <span class="progress-dot"></span>
          <span class="progress-dot"></span>
        </div>
        <button class="skip-button" type="button">건너뛰기</button>
      </header>

      <div class="tutorial-screen">
        <section class="space-stage">
          <div class="star-field" aria-hidden="true">
            <span class="star star-1"></span>
            <span class="star star-2"></span>
            <span class="star star-3"></span>
            <span class="star star-4"></span>
            <span class="star star-5"></span>
            <span class="star star-6"></span>
          </div>

          <div class="target-star" aria-hidden="true">
            <span></span>
          </div>

          <div class="constellation" aria-hidden="true">
            <svg class="constellation-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
              <line class="constellation-line constellation-line-1" x1="28" y1="68" x2="48" y2="42"></line>
              <line class="constellation-line constellation-line-2" x1="48" y1="42" x2="72" y2="58"></line>
            </svg>
            <span class="constellation-star constellation-star-1" data-constellation-star="0"></span>
            <span class="constellation-star constellation-star-2" data-constellation-star="1"></span>
            <span class="constellation-star constellation-star-3" data-constellation-star="2"></span>
          </div>

          <div class="star-map" aria-hidden="true">
            <div class="star-map-track">
              <section class="map-panel map-panel-1">
                <span class="map-star map-star-a"></span>
                <span class="map-star map-star-b"></span>
                <span class="nebula-orbit"></span>
              </section>
              <section class="map-panel map-panel-2">
                <span class="map-star map-star-c"></span>
                <span class="map-star map-star-d"></span>
                <span class="map-star map-star-e"></span>
              </section>
              <section class="map-panel map-panel-3">
                <span class="hidden-constellation">
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
              </section>
            </div>
          </div>

          <div class="center-star" aria-hidden="true">
            <span></span>
          </div>

          <div class="star-pointer" aria-hidden="true">
            <span class="pointer-dust pointer-dust-1"></span>
            <span class="pointer-dust pointer-dust-2"></span>
            <span class="pointer-dust pointer-dust-3"></span>
          </div>

          <div class="intro-copy">
            <p class="step-label">Mission 1</p>
            <h1>별빛을 깨워보세요</h1>
            <p class="mission-instruction">터치패드에 마우스를 올리고 포인터를 첫 번째 별까지 움직여요.</p>
          </div>

          <div class="completion-panel" aria-live="polite">
            <p class="completion-kicker">Tutorial complete</p>
            <h2>별빛 포인팅 준비 완료</h2>
            <p>이제 리모컨으로 가리키고, 넘기고, 중심으로 돌아올 수 있어요.</p>
            <button class="completion-button" type="button">TV로 계속하기</button>
          </div>
        </section>

        <aside class="remote-guide" aria-label="Remote guide">
          <div class="remote-body">
            <div class="power-dot"></div>
            <div class="number-dot">123</div>
            <div class="voice-dot"></div>
            <div class="touchpad-ring" role="button" tabindex="0" aria-label="터치패드 누르기">
              <div class="touchpad-core"></div>
            </div>
            <div class="nav-button nav-button-back"></div>
            <div class="nav-button nav-button-home"></div>
            <div class="nav-button nav-button-play"></div>
            <div class="remote-button-dot remote-button-dot-1"></div>
            <div class="remote-button-dot remote-button-dot-2"></div>
            <div class="remote-button-dot remote-button-dot-3"></div>
            <div class="remote-button-wide"></div>
            <div class="remote-button-pill remote-button-pill-1"></div>
            <div class="remote-button-pill remote-button-pill-2"></div>
            <div class="remote-button-pill remote-button-pill-3"></div>
            <div class="remote-button-pill remote-button-pill-4"></div>
          </div>
        </aside>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
